name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: healtharchive-backend-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend
        uses: actions/checkout@v6
        with:
          path: healtharchive-backend
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: healtharchive-backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,docs]"

      - name: Generate API and assistant context
        working-directory: healtharchive-backend
        run: |
          PYTHONPATH=src python3 scripts/export_openapi.py
          python3 scripts/generate_llms_txt.py

      - name: Build Documentation
        working-directory: healtharchive-backend
        run: make docs-build

      - name: Docs references (advisory)
        working-directory: healtharchive-backend
        continue-on-error: true
        run: make docs-refs

      - name: Docs coverage (advisory)
        working-directory: healtharchive-backend
        continue-on-error: true
        run: make docs-coverage

      - name: Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --exclude-mail "healtharchive-backend/site/**/*.html"
          fail: false # Set to true if you want to block on dead links

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./healtharchive-backend/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
